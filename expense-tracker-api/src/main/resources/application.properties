spring.application.name=expense-tracker-api
server.port=${PORT:8080}

# Database Configuration (Defaults to local H2, overridden by env vars in production)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:expensedb}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.H2Dialect}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 Web Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JWT Secret
app.jwt.secret=${JWT_SECRET:94a08da1d1f5e8b7f8c09dbe9a473489849504a582c81d3ee59483325c846d0a}
app.jwt.expiration-ms=86400000
